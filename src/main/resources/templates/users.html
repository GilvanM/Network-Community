<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>

<h1>Users</h1>

    <div th:each="user : ${users}">
        <h2 th:text="${user.name}"></h2>
        <p th:text="${user.email}"></p>
        <a th:href="@{/profile/{id}(id=${user.id})}">
            View Profile
        </a>


    </div>

</body>
</html>
