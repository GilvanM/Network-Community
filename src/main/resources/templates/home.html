<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home</title>
</head>
<body>

<a href="/logout">Sair</a>

<h1>Network Community</h1>

<p>Logado como: <b th:text="${currentUser}"></b></p>

<a href="/register">Cadastrar usuário</a>

<hr>

<form action="/users" method="get">

    <input type="text"
           name="name"
           placeholder="Buscar usuário por nome"
           th:value="${search}" />

    <input type="hidden" name="page" value="0"/>

    <button type="submit">Buscar</button>

</form>

<hr>

<h2>Usuários cadastrados</h2>

<ul>

    <li th:each="user : ${users}">

        <b th:text="${user.name}"></b> -
        <span th:text="${user.email}"></span>

        <a th:href="@{/profile/{id}(id=${user.id})}">
            View Profile
        </a>

    </li>

</ul>

<!-- PAGINAÇÃO -->

<div>

    <a th:if="${currentPage > 0}"
       th:href="@{/users(page=${currentPage - 1}, name=${search})}">
        Anterior
    </a>

    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">

        <a th:if="${i != currentPage}"
           th:href="@{/users(page=${i}, name=${search})}"
           th:text="${i}">
        </a>

        <span th:if="${i == currentPage}"
              th:text="${i}">
        </span>

    </span>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/users(page=${currentPage + 1}, name=${search})}">
        Próximo
    </a>

</div>

</body>
</html>
